<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>PAY54 — Sign Up</title>
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

<!-- PAY54 AUTH BRAND -->
<div class="pay54-auth-brand">
  <img src="assets/img/pay54-logo.svg" alt="PAY54" />
</div>

<div class="auth-wrapper">

  <h1>Create your account</h1>

  <div class="info-box">
    <p>🌍 One wallet for Africa and global currencies</p>
    <p>🚀 Fast, secure onboarding in minutes</p>
    <p>🔐 Protected by PIN & session security</p>
  </div>

  <div id="msg" class="message"></div>

 <form onsubmit="signup(event)" autocomplete="off">
  <input
    id="signup-name"
    type="text"
    placeholder="Full name"
    required
    autocomplete="off"
    autocorrect="off"
    autocapitalize="words"
    spellcheck="false"
  >

  <input
    id="signup-email"
    type="email"
    placeholder="Email"
    required
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
  >
<div class="phone-field">

<select id="signup-country">
<option value="+44">🇬🇧 +44</option>
<option value="+234">🇳🇬 +234</option>
<option value="+233">🇬🇭 +233</option>
<option value="+254">🇰🇪 +254</option>
<option value="+27">🇿🇦 +27</option>
</select>

<input
id="signup-phone"
type="tel"
placeholder="Telephone"
required
/>

</div>

  <input
    id="signup-pin"
    type="password"
    placeholder="Create PIN"
    required
    inputmode="numeric"
    pattern="[0-9]*"
    autocomplete="new-password"
  >

  <input
    id="signup-confirm-pin"
    type="password"
    placeholder="Confirm PIN"
    required
    inputmode="numeric"
    pattern="[0-9]*"
    autocomplete="new-password"
  >

  <button type="submit">Create account</button>
</form>


  <div class="links">
    <a href="login.html">Already have an account? Login</a>
  </div>

  <div class="security-banner">
    🔐 Bank-grade security • Session & PIN protected • Built for Africa
  </div>

</div>

<script src="assets/js/auth.js"></script>
</body>
</html>
